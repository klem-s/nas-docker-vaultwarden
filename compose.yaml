services:
  #─────────────────────────────────────────
  #  VAULTWARDEN – Password manager
  # ─────────────────────────────────────────
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    environment:
      - DOMAIN=https://ward.${DOMAIN}
      - SIGNUPS_ALLOWED=false
    volumes:
      - ${CONFIG}/vaultwarden:/data
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.vaultwarden.rule=Host(`ward.${DOMAIN}`)
      - traefik.http.routers.vaultwarden.entrypoints=websecure
      - traefik.http.routers.vaultwarden.tls.certresolver=letsencrypt
      - traefik.http.routers.vaultwarden-lan.rule=Host(`ward.lan`)
      - traefik.http.routers.vaultwarden-lan.entrypoints=websecure
      - traefik.http.routers.vaultwarden-lan.tls=true
      - traefik.http.services.vaultwarden.loadbalancer.server.port=80
networks:
  proxy:
    external: true
